<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe listo — ICEA | KPI99</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .success-page { max-width: 560px; margin: 0 auto; padding: 80px 20px; text-align: center; }
        .success-page h1 { font-size: 1.75rem; color: #1e3a8a; margin-bottom: 0.5rem; }
        .success-page p { color: #64748b; margin-bottom: 1.5rem; }
        .success-page .btn { display: inline-block; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="success-page">
        <h1>Pago exitoso</h1>
        <p>Su informe KPI99 ICEA está listo. Véalo en el navegador o descargue en PDF.</p>
        <a href="#" id="view-link" class="btn btn-primary">Ver informe</a>
        <a href="#" id="download-link" class="btn" style="margin-left: 0.5rem; background: #64748b;">Descargar PDF</a>
        <p style="margin-top: 1.5rem;"><a href="/es/">Ejecutar otro análisis</a></p>
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            if (!token) {
                document.querySelector('.success-page h1').textContent = 'Token faltante';
                document.querySelector('.success-page p').textContent = 'No hay token de informe en la URL. Inicie un nuevo análisis desde la página principal.';
                document.getElementById('view-link').style.display = 'none';
                document.getElementById('download-link').style.display = 'none';
                return;
            }
            var viewLink = document.getElementById('view-link');
            viewLink.href = '/v1/report-paid?token=' + encodeURIComponent(token) + '&lang=es';
            var downloadLink = document.getElementById('download-link');
            downloadLink.href = '/v1/report-paid?token=' + encodeURIComponent(token) + '&format=pdf&lang=es';
            downloadLink.download = 'icea-report.pdf';
            downloadLink.target = '_blank';
        })();
    </script>
</body>
</html>
